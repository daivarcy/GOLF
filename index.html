<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>ゴルフ予約</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:#f5f5f5;color:#1a1a1a;min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;
  display:flex;flex-direction:column;position:relative}
.header{padding:env(safe-area-inset-top,0) 0 0;background:#fff;
  border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;gap:10px;padding:14px 16px}
.header h1{font-size:17px;font-weight:600;flex:1}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;
  color:#666;padding:0 4px;line-height:1;display:none}
.sync-indicator{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.sync-dot.ok{background:#22c55e}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e5}
.nav-btn{flex:1;padding:12px 2px;border:none;background:none;font-size:11px;
  color:#888;cursor:pointer;border-bottom:2px solid transparent;
  font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .nav-icon{font-size:18px}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}

.screen{display:none;flex:1;overflow-y:auto;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)}
.screen.show{display:block}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px}
.cal-month{font-size:17px;font-weight:600}
.cal-arrow{background:none;border:1px solid #ddd;border-radius:8px;
  padding:7px 14px;font-size:15px;cursor:pointer;color:#1a1a1a}
.cal-grid{padding:0 10px}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-wday{text-align:center;font-size:12px;color:#888;padding:4px 0;font-weight:500}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:10px;border:none;background:none;
  font-size:14px;cursor:pointer;position:relative;gap:3px;color:#1a1a1a}
.cal-day:active{background:#f0f0f0}
.cal-day.empty{pointer-events:none}
.cal-day.past{color:#ccc;pointer-events:none}
.cal-day.today{background:#f0f0f0;font-weight:600}
.cal-day.sel{background:#1a1a1a;color:#fff}
.cal-day.sel .dot{background:#fff}
.cal-day .dot{width:5px;height:5px;border-radius:50%;background:#3b82f6}
.cal-day.sun{color:#ef4444}
.cal-day.sat{color:#3b82f6}
.cal-day.past.sun,.cal-day.past.sat{color:#ccc}
.cal-day.sel.sun,.cal-day.sel.sat{color:#fff}

.day-panel{padding:0 12px;margin-top:8px}
.day-title{font-size:15px;font-weight:600;padding:12px 4px 10px}
.bk-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;
  padding:12px 14px;margin-bottom:8px}
.bk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bk-time{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.bk-badges{display:flex;gap:5px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-c{background:#dbeafe;color:#1d4ed8}
.badge-t{background:#dcfce7;color:#15803d}
.badge-v{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.badge-contact-ok{background:#dcfce7;color:#15803d}
.badge-contact-ng{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.bk-members{font-size:13px;color:#555;margin-bottom:3px}
.bk-booker{font-size:12px;color:#888}
.bk-note{font-size:12px;color:#666;margin-top:6px;padding-top:6px;
  border-top:1px solid #f0f0f0}
.bk-actions{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;
  border:1px solid #ddd;background:none;cursor:pointer;font-family:inherit;color:#555}
.btn-sm.danger{color:#ef4444;border-color:#fca5a5}
.btn-add-day{width:100%;margin-top:4px;padding:14px;background:#1a1a1a;color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit}
.btn-add-day:active{opacity:.85}
.empty-day{text-align:center;padding:24px 16px;color:#888;font-size:14px}

/* ── FORM ── */
.form-wrap{padding:0 16px}
.form-sec{margin-top:18px}
.form-label{font-size:12px;color:#666;font-weight:500;letter-spacing:.03em;
  display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 14px;
  border:1px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;
  background:#fff;color:#1a1a1a;-webkit-appearance:none;outline:none;
  transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#1a1a1a}
.form-input::placeholder,.form-textarea::placeholder{color:#bbb}
.form-textarea{resize:none;line-height:1.6}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;
  transform:translateY(-50%);pointer-events:none;color:#888;font-size:12px}
.member-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.chip{display:inline-flex;align-items:center;gap:5px;background:#f5f5f5;
  border:1px solid #ddd;border-radius:20px;padding:5px 10px;font-size:13px}
.chip-del{background:none;border:none;cursor:pointer;color:#888;font-size:15px;
  padding:0;line-height:1}
.member-add-row{display:flex;gap:8px;margin-top:8px}
.member-add-row .sel-wrap{flex:1}
.btn-add-member{padding:12px 16px;background:#1a1a1a;color:#fff;border:none;
  border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
.conflict-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;
  padding:10px 12px;font-size:13px;color:#b91c1c;margin-top:8px}
.btn-submit{width:100%;margin-top:24px;padding:16px;background:#1a1a1a;color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;
  font-family:inherit}
.btn-submit:active{opacity:.85}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}

/* ── LIST ── */
.filter-row{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;
  scrollbar-width:none;border-bottom:1px solid #f0f0f0}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:7px 14px;border:1px solid #ddd;
  border-radius:20px;background:none;font-size:13px;cursor:pointer;
  font-family:inherit;color:#555;flex-shrink:0}
.filter-chip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.list-body{padding:10px 12px}
.list-date-hd{font-size:12px;color:#888;font-weight:600;
  padding:10px 4px 6px;letter-spacing:.04em}

/* ── MY ── */
.my-top{padding:12px 16px;border-bottom:1px solid #f0f0f0}
.date-range-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:#f9f9f9;
  border-bottom:1px solid #f0f0f0;flex-wrap:wrap;
}
.date-range-bar label{font-size:11px;color:#888;white-space:nowrap}
.date-range-bar input[type=date]{
  padding:6px 8px;border:1px solid #ddd;border-radius:8px;
  font-size:13px;font-family:inherit;color:#1a1a1a;
  background:#fff;-webkit-appearance:none;outline:none;
  flex:1;min-width:120px;
}
.date-range-bar input[type=date]:focus{border-color:#1a1a1a}
.btn-range-reset{
  padding:6px 12px;background:none;border:1px solid #ddd;
  border-radius:8px;font-size:12px;color:#888;cursor:pointer;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
}
.btn-range-reset:active{background:#f0f0f0}
.date-range-sep{font-size:12px;color:#aaa;flex-shrink:0}

/* ── MASTER ── */
.master-sec{padding:16px}
.master-sec+.master-sec{border-top:1px solid #f0f0f0}
.master-sec-title{font-size:14px;font-weight:600;margin-bottom:10px}
.master-item{display:flex;align-items:center;justify-content:space-between;
  padding:11px 12px;background:#f9f9f9;border-radius:8px;font-size:14px;margin-bottom:6px}
.master-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;padding:0;line-height:1}
.master-edit{background:none;border:1px solid #ddd;border-radius:6px;
  cursor:pointer;color:#555;font-size:11px;padding:4px 8px;
  font-family:inherit;margin-right:4px}
.master-edit:active{background:#f0f0f0}
.master-edit-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.master-edit-inp{flex:1;padding:8px 10px;border:1px solid #1a1a1a;
  border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.master-edit-save{padding:8px 14px;background:#1a1a1a;color:#fff;
  border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.master-edit-cancel{padding:8px 12px;background:none;border:1px solid #ddd;
  border-radius:8px;font-size:13px;cursor:pointer;color:#888;font-family:inherit}
.master-add{display:flex;gap:8px;margin-top:4px}
.master-add .form-input{flex:1}
.master-add button{padding:12px 16px;background:#1a1a1a;color:#fff;border:none;
  border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
.fixed-tag{font-size:11px;padding:2px 8px;border-radius:10px;
  background:#f0f0f0;color:#888}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;color:#888;gap:12px}
.spinner{width:28px;height:28px;border:3px solid #f0f0f0;
  border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:24px 20px calc(env(safe-area-inset-bottom,0px)+20px);
  animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:600;margin-bottom:8px}
.modal-body{font-size:14px;color:#666;line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:14px;border-radius:10px;font-size:15px;
  font-family:inherit;cursor:pointer;font-weight:500}
.btn-modal-cancel{background:#f5f5f5;border:none;color:#555}
.btn-modal-ok{background:#1a1a1a;border:none;color:#fff}
.btn-modal-danger{background:#ef4444;border:none;color:#fff}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);
  left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;
  color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;opacity:0;
  transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
      <h1 id="header-title">ゴルフ予約</h1>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label"></span>
      </div>
    </div>
    <div class="nav" id="main-nav">
      <button class="nav-btn active" onclick="showTab('cal')">
        <span class="nav-icon">📅</span>カレンダー
      </button>
      <button class="nav-btn" onclick="showTab('list')">
        <span class="nav-icon">📋</span>一覧
      </button>
      <button class="nav-btn" onclick="showTab('my')">
        <span class="nav-icon">👤</span>マイ予約
      </button>
      <button class="nav-btn" onclick="showTab('master')">
        <span class="nav-icon">⚙️</span>マスタ
      </button>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen show" id="sc-cal">
    <div class="cal-nav">
      <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month" id="cal-month"></span>
      <button class="cal-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-wdays">
        <div class="cal-wday" style="color:#ef4444">日</div>
        <div class="cal-wday">月</div><div class="cal-wday">火</div>
        <div class="cal-wday">水</div><div class="cal-wday">木</div>
        <div class="cal-wday">金</div>
        <div class="cal-wday" style="color:#3b82f6">土</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="day-panel" class="day-panel" style="display:none"></div>
  </div>

  <!-- LIST -->
  <div class="screen" id="sc-list">
    <div style="display:flex;justify-content:flex-end;gap:6px;padding:10px 14px 0">
      <button onclick="downloadPDF()" style="background:#1a1a1a;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">📄 PDF</button>
      <button onclick="downloadExcel()" style="background:#217346;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">📊 Excel</button>
    </div>
    <div class="date-range-bar">
      <label>表示期間</label>
      <input type="date" id="list-from" onchange="renderList()">
      <span class="date-range-sep">〜</span>
      <input type="date" id="list-to" onchange="renderList()">
      <button class="btn-range-reset" onclick="resetListRange()">今日〜3ヶ月</button>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div class="list-body" id="list-body"></div>
  </div>

  <!-- MY -->
  <div class="screen" id="sc-my">
    <div class="my-top">
      <div class="sel-wrap">
        <select class="form-select" id="my-sel" onchange="renderMy()">
          <option value="">メンバーを選択...</option>
        </select>
      </div>
    </div>
    <div class="date-range-bar">
      <label>表示期間</label>
      <input type="date" id="my-from" onchange="renderMy()">
      <span class="date-range-sep">〜</span>
      <input type="date" id="my-to" onchange="renderMy()">
      <button class="btn-range-reset" onclick="resetMyRange()">今日〜3ヶ月</button>
    </div>
    <div class="list-body" id="my-body"></div>
  </div>

  <!-- MASTER -->
  <div class="screen" id="sc-master">
    <div class="master-sec">
      <div class="master-sec-title">メンバーマスタ</div>
      <div id="member-list"></div>
      <div class="master-add">
        <input class="form-input" id="new-member" placeholder="名前を入力" maxlength="20">
        <button onclick="addMember()">追加</button>
      </div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">ゴルフ場マスタ</div>
      <div id="gcourse-list"></div>
      <div class="master-add">
        <input class="form-input" id="new-gcourse" placeholder="ゴルフ場名を入力" maxlength="30">
        <button onclick="addGolfCourse()">追加</button>
      </div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">コースマスタ</div>
      <div id="course-list"></div>
      <div class="master-add">
        <input class="form-input" id="new-course" placeholder="コース名を入力（例：EAST→WEST）" maxlength="20">
        <button onclick="addCourse()">追加</button>
      </div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">区分マスタ</div>
      <div class="master-item">通常 <span class="fixed-tag">固定</span></div>
      <div class="master-item">スルー <span class="fixed-tag">固定</span></div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">連絡区分マスタ</div>
      <div class="master-item">未連絡 <span class="fixed-tag">デフォルト</span></div>
      <div class="master-item">連絡済 <span class="fixed-tag">固定</span></div>
    </div>
  </div>

  <!-- FORM -->
  <div class="screen" id="sc-form">
    <div class="form-wrap">
      <input type="hidden" id="edit-id">
      <div class="form-sec">
        <label class="form-label">予約者</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-booker" onchange="onFormChange()">
            <option value="">選択してください</option>
          </select>
        </div>
      </div>
      <div class="form-sec">
        <label class="form-label">日付</label>
        <input type="date" class="form-input" id="f-date" onchange="onFormChange()">
      </div>
      <div class="form-sec">
        <label class="form-label">時刻</label>
        <div class="time-row">
          <div class="sel-wrap">
            <select class="form-select" id="f-hour" onchange="onFormChange()"></select>
          </div>
          <div class="sel-wrap">
            <select class="form-select" id="f-min" onchange="onFormChange()"></select>
          </div>
        </div>
      </div>
      <div class="form-sec">
        <label class="form-label">コース</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-course" onchange="onFormChange()">
            <option>OUT→IN</option>
            <option>WEST→OUT</option>
            <option>IN→WEST</option>
          </select>
        </div>
      </div>
      <div class="form-sec">
        <label class="form-label">区分</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-type">
            <option>通常</option>
            <option>スルー</option>
          </select>
        </div>
      </div>
      <div id="conflict-area"></div>
      <div class="form-sec">
        <label class="form-label">同伴メンバー（最大3名）</label>
        <div class="member-chips" id="member-chips"></div>
        <div class="member-add-row" id="member-add-row">
          <div class="sel-wrap">
            <select class="form-select" id="add-mem-sel">
              <option value="">追加するメンバー...</option>
            </select>
          </div>
          <button class="btn-add-member" onclick="addMemberToForm()">追加</button>
        </div>
      </div>
      <div class="form-sec">
        <label class="form-label">ゴルフ場</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-gcourse"></select>
        </div>
      </div>
      <div class="form-sec">
        <label class="form-label">備考（任意）</label>
        <textarea class="form-textarea" id="f-note" rows="3" placeholder="コンペ名など"></textarea>
      </div>
      <div class="form-sec">
        <label class="form-label">連絡区分</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-contact">
            <option>未連絡</option>
            <option>連絡済</option>
          </select>
        </div>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submitForm()">予約を登録する</button>
      <div style="height:20px"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════
//  Supabase 設定
// ══════════════════════════════════════
const SUPABASE_URL = 'https://wczqpyrsbitlcmcmuegs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jKew2LZXDLU64r_VlPrO3w_JFz8cvDY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let D = {

  bookings: [],

  const d = new Date(s+'T00:00:00');

async function loadAll(){
  setSyncStatus('loading','読み込み中...');
  // ローカルマスタ（コース・ゴルフ場）を復元
  try{ const c=localStorage.getItem('golf_courses'); if(c) D.courses=JSON.parse(c); }catch{}
  try{ const g=localStorage.getItem('golf_gcourses'); if(g) D.golfCourses=JSON.parse(g); }catch{}
  try{
    const [mRes, bRes] = await Promise.all([
      sb.from('members').select('*').order('created_at'),
      sb.from('bookings').select('*').order('date').order('hour').order('min')
    ]);
    if(mRes.error) throw mRes.error;
    if(bRes.error) throw bRes.error;
    D.members  = mRes.data.map(r=>r.name);
    D.bookings = bRes.data.map(r=>({
      id:          r.id,
      booker:      r.booker,
      date:        r.date,
      hour:        r.hour,
      min:         r.min,
      course:      r.course,
      type:        r.type,
      members:     Array.isArray(r.members) ? r.members : [],
      note:        r.note || '',
      contact:     r.contact || '未連絡',
      golfCourse:  r.golf_course || '東名厚木CC',
      createdAt:   r.created_at
    }));
    setSyncStatus('ok','');
  }catch(e){
    setSyncStatus('err','読込失敗');
    toast('データの読み込みに失敗しました');
  }
}

//  CALENDAR
// ══════════════════════════════════════
function changeMonth(d){
  calM += d;
  if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;}
  selDate = null; renderCal();
}

function renderCal(){
  document.getElementById('cal-month').textContent = `${calY}年${calM+1}月`;
  const first = new Date(calY,calM,1);
  const last  = new Date(calY,calM+1,0);
  let html = '';
  for(let i=0;i<first.getDay();i++) html += '<div class="cal-day empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt  = new Date(calY,calM,d);
    const ds  = fmt(dt);
    const past  = dt < today;
    const isTod = ds === fmt(today);
    const isSel = ds === selDate;
    const hasBk = D.bookings.some(b=>b.date===ds);
    const dow   = dt.getDay();
    let cls = 'cal-day';
    if(past)  cls+=' past';
    if(isTod) cls+=' today';
    if(isSel) cls+=' sel';
    if(!isSel&&dow===0&&!past) cls+=' sun';
    if(!isSel&&dow===6&&!past) cls+=' sat';
    html += `<button class="${cls}" onclick="selectDate('${ds}')">
      <span style="font-size:14px;line-height:1">${d}</span>
      ${hasBk?'<span class="dot"></span>':''}
    </button>`;
  }
  document.getElementById('cal-days').innerHTML = html;
  renderDayPanel();
}

function selectDate(ds){
  const dt = new Date(ds+'T00:00:00');
  if(dt < today) return;
  selDate = ds; renderCal();
}

function renderDayPanel(){
  const panel = document.getElementById('day-panel');
  if(!selDate){ panel.style.display='none'; return; }
  panel.style.display = 'block';
  const bks = D.bookings.filter(b=>b.date===selDate);
  let html = `<div class="day-title">${dispDate(selDate)}</div>`;
  if(!bks.length) html += '<div class="empty-day">この日の予約はありません</div>';
  else html += bks.map(b=>bkCardHtml(b,true)).join('');
  html += `<button class="btn-add-day" onclick="showForm(null)">＋ この日に予約する</button>`;
  panel.innerHTML = html;
}

// ══════════════════════════════════════
//  BOOKING CARD
// ══════════════════════════════════════
function bkCardHtml(b, showActions=false){
  const all = [b.booker,...(Array.isArray(b.members)?b.members:[])];
  const vacancy = 4 - all.length;
  const vacancyHtml = vacancy > 0
    ? `<span class="badge badge-v">空き${vacancy}名</span>`
    : '';
  const contact = b.contact || '未連絡';
  const contactHtml = `<span class="badge ${contact==='連絡済'?'badge-contact-ok':'badge-contact-ng'}">${contact}</span>`;
  const golfCourse = b.golfCourse || '東名厚木CC';
  return `<div class="bk-card">
    <div class="bk-top">
      <span class="bk-time">${b.hour}:${b.min}</span>
      <div class="bk-badges">
        <span class="badge badge-c">${b.course}</span>
        <span class="badge badge-t">${b.type}</span>
        ${vacancyHtml}
        ${contactHtml}
      </div>
    </div>
    <div class="bk-members">${all.join('・')}（${all.length}名）</div>
    <div class="bk-booker">予約者：${b.booker}　<span style="color:#888;font-size:11px">${golfCourse}</span></div>
    ${b.note?`<div class="bk-note">${b.note}</div>`:''}
    ${showActions?`<div class="bk-actions">
      <button class="btn-sm" onclick="showForm('${b.id}')">編集</button>
      <button class="btn-sm danger" onclick="deleteBk('${b.id}')">削除</button>
    </div>`:''}
  </div>`;
}

// ── 日付範囲ヘルパー ──
function todayStr(){
  const d=new Date(); d.setHours(0,0,0,0);
  return fmt(d);
}
function plus3Months(){
  const d=new Date(); d.setHours(0,0,0,0);
  d.setMonth(d.getMonth()+3);
  return fmt(d);
}
function initListRange(){
  const f=document.getElementById('list-from');
  const t=document.getElementById('list-to');
  if(!f.value) f.value=todayStr();
  if(!t.value) t.value=plus3Months();
}
function resetListRange(){
  document.getElementById('list-from').value=todayStr();
  document.getElementById('list-to').value=plus3Months();
  renderList();
}
function initMyRange(){
  const f=document.getElementById('my-from');
  const t=document.getElementById('my-to');
  if(!f.value) f.value=todayStr();
  if(!t.value) t.value=plus3Months();
}
function resetMyRange(){
  document.getElementById('my-from').value=todayStr();
  document.getElementById('my-to').value=plus3Months();
  renderMy();
}

function renderList(){
  initListRange();
  const row = document.getElementById('filter-row');
  if(!row.dataset.init){
    const chips = ['すべて','OUT→IN','WEST→OUT','IN→WEST','通常','スルー'];
    row.innerHTML = chips.map((c,i)=>`<button class="filter-chip${i===0?' on':''}" data-f="${c}" onclick="toggleFilter(this)">${c}</button>`).join('');
    row.dataset.init='1';
  }
  const active = [...row.querySelectorAll('.filter-chip.on')].map(b=>b.dataset.f);
  const fromDate = document.getElementById('list-from').value;
  const toDate   = document.getElementById('list-to').value;
  let bks = [...D.bookings];
  // 日付範囲フィルタ
  if(fromDate) bks = bks.filter(b=>b.date>=fromDate);
  if(toDate)   bks = bks.filter(b=>b.date<=toDate);
  // コース・区分フィルタ
  if(!active.includes('すべて'))
    bks = bks.filter(b=>active.some(f=>b.course===f||b.type===f));
  const body = document.getElementById('list-body');
  if(!bks.length){
    body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">この期間の予約はありません</div>';
    return;
  }
  let html='', last='';
  bks.forEach(b=>{
    if(b.date!==last){ html+=`<div class="list-date-hd">${dispDate(b.date)}</div>`; last=b.date; }
    html+=bkCardHtml(b,true);
  });
  body.innerHTML=html;
}

function toggleFilter(btn){
  if(btn.dataset.f==='すべて'){
    document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  } else {
    document.querySelector('[data-f="すべて"]').classList.remove('on');
    btn.classList.toggle('on');
    if(!document.querySelectorAll('.filter-chip.on').length)
      document.querySelector('[data-f="すべて"]').classList.add('on');
  }
  renderList();
}

//  共通：出力データを取得

function getFilteredBks(){
  const row = document.getElementById('filter-row');
  const active = row.dataset.init
    ? [...row.querySelectorAll('.filter-chip.on')].map(b=>b.dataset.f)
    : ['すべて'];
  const fromDate = document.getElementById('list-from').value;
  const toDate   = document.getElementById('list-to').value;
  let bks = [...D.bookings];
  if(fromDate) bks = bks.filter(b=>b.date>=fromDate);
  if(toDate)   bks = bks.filter(b=>b.date<=toDate);
  if(!active.includes('すべて'))
    bks = bks.filter(b=>active.some(f=>b.course===f||b.type===f));
  return bks;
}

//  Excel出力（SheetJSライブラリを使用）
// ══════════════════════════════════════
async function downloadExcel(){
  if(!D.bookings.length){ toast('予約がありません'); return; }
  const bks = getFilteredBks();
  if(!bks.length){ toast('表示中の予約がありません'); return; }

  // SheetJSを動的ロード
  if(!window.XLSX){
    toast('Excelライブラリを読み込み中...');
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }

  // ヘッダー
  const headers=['日付','曜日','時刻','ゴルフ場','コース','区分','予約者','同伴メンバー','連絡区分','備考'];
  const dow='日月火水木金土';
  const data=bks.map(b=>{
    const d=new Date(b.date+'T00:00:00');
    return [
      b.date,
      dow[d.getDay()],
      `${b.hour}:${b.min}`,
      b.golfCourse||'',
      b.course,
      b.type,
      b.booker,
      Array.isArray(b.members)?b.members.join('・'):'',
      b.contact||'未連絡',
      b.note||''
    ];
  });

  const ws = XLSX.utils.aoa_to_sheet([headers,...data]);
  // 列幅設定
  ws['!cols']=[
    {wch:12},{wch:5},{wch:8},{wch:14},{wch:10},{wch:6},
    {wch:8},{wch:20},{wch:8},{wch:30}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'予約一覧');
  const fname=`ゴルフ予約_${new Date().toLocaleDateString('ja').replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast('Excelをダウンロードしました');
}



// ══════════════════════════════════════
//  MY
// ══════════════════════════════════════
function renderMySel(){
  const sel = document.getElementById('my-sel');
  // localStorage から前回の選択を復元
  const saved = localStorage.getItem('golf_my_member') || sel.value || '';
  sel.innerHTML = '<option value="">メンバーを選択...</option>'+
    D.members.map(m=>`<option value="${m}">${m}</option>`).join('');
  if(saved) sel.value = saved;
  renderMy();
}
function renderMy(){
  initMyRange();
  const name = document.getElementById('my-sel').value;
  if(name) localStorage.setItem('golf_my_member', name);
  const fromDate = document.getElementById('my-from').value;
  const toDate   = document.getElementById('my-to').value;
  const body = document.getElementById('my-body');
  if(!name){ body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">メンバーを選択してください</div>'; return; }
  let bks = D.bookings.filter(b=>b.booker===name||b.members.includes(name));
  // 日付範囲フィルタ
  if(fromDate) bks = bks.filter(b=>b.date>=fromDate);
  if(toDate)   bks = bks.filter(b=>b.date<=toDate);
  if(!bks.length){
    body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">この期間の予約はありません</div>';
    return;
  }
  let html='', last='';
  bks.forEach(b=>{
    if(b.date!==last){ html+=`<div class="list-date-hd">${dispDate(b.date)}</div>`; last=b.date; }
    html+=bkCardHtml(b, b.booker===name);
  });
  body.innerHTML=html;
}

// ══════════════════════════════════════
//  FORM
// ══════════════════════════════════════
function onFormChange(){ checkConflict(); renderFormMems(); }

function renderFormMems(){
  const booker = document.getElementById('f-booker').value;
  const chips  = document.getElementById('member-chips');
  chips.innerHTML = formMems.map(m=>`
    <span class="chip">${m}
      <button class="chip-del" onclick="removeMem('${m}')">×</button>
    </span>`).join('');
  const used = new Set([booker,...formMems]);
  const addSel = document.getElementById('add-mem-sel');
  addSel.innerHTML = '<option value="">追加するメンバー...</option>'+
    D.members.filter(m=>!used.has(m)).map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('member-add-row').style.display =
    formMems.length >= 3 ? 'none' : 'flex';
}

function addMemberToForm(){
  const sel = document.getElementById('add-mem-sel');
  if(!sel.value || formMems.length>=3) return;
  formMems.push(sel.value); renderFormMems();
}
function removeMem(name){ formMems=formMems.filter(m=>m!==name); renderFormMems(); }

function checkConflict(){
  const date   = document.getElementById('f-date').value;
  const hour   = document.getElementById('f-hour').value;
  const min    = document.getElementById('f-min').value;
  const course = document.getElementById('f-course').value;
  const area   = document.getElementById('conflict-area');
  if(!date||!hour||!min||!course){ area.innerHTML=''; return; }
  const hits = D.bookings.filter(b=>
    b.date===date&&b.hour===hour&&b.min===min&&b.course===course&&b.id!==editId
  );
  area.innerHTML = hits.length
    ? `<div class="conflict-box">⚠ ${hour}:${min} ${course} にすでに${hits.length}件の予約があります（${hits.map(b=>b.booker).join('・')}）</div>`
    : '';
}

async function submitForm(){
  const booker = document.getElementById('f-booker').value;
  const date   = document.getElementById('f-date').value;
  const hour   = document.getElementById('f-hour').value;
  const min    = document.getElementById('f-min').value;
  const course = document.getElementById('f-course').value;
  const type   = document.getElementById('f-type').value;
  const note   = document.getElementById('f-note').value.trim();
  if(!booker){ toast('予約者を選択してください'); return; }
  if(!date)  { toast('日付を選択してください');   return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '登録中...';

  const contact    = document.getElementById('f-contact').value;
  const golfCourse = document.getElementById('f-gcourse').value;
  const data = {booker,date,hour,min,course,type,members:formMems,note,contact,golfCourse};
  let ok = false;
  if(editId){
    ok = await updateBooking(editId, data);
  } else {
    const res = await saveBooking(data);
    ok = !!res;
  }

  btn.disabled = false;
  btn.textContent = '予約を登録する';

  if(ok){
    await loadAll();
    toast(editId ? '予約を更新しました' : '予約を登録しました');
    goBack();
  }
}

// ══════════════════════════════════════
//  MASTER
// ══════════════════════════════════════
function renderMembers(){
  document.getElementById('member-list').innerHTML =
    D.members.map(m=>`
      <div class="master-item" id="mi-${CSS.escape(m)}">
        <span class="mi-name">${m}</span>
        <div style="display:flex;gap:4px">
          <button class="master-edit" onclick="startEditMember('${m}')">編集</button>
          <button class="master-del"  onclick="deleteMember('${m}')">×</button>
        </div>
      </div>`).join('');
}

function startEditMember(oldName){
  // 他の編集中行があれば閉じる
  document.querySelectorAll('.master-edit-row').forEach(r=>r.remove());
  document.querySelectorAll('.master-item').forEach(el=>el.style.flexWrap='');

  const item = document.getElementById('mi-'+CSS.escape(oldName));
  if(!item) return;
  item.style.flexWrap = 'wrap';

  const row = document.createElement('div');
  row.className = 'master-edit-row';
  row.style.width = '100%';
  row.innerHTML = `
    <input class="master-edit-inp" id="edit-inp-${CSS.escape(oldName)}"
      value="${oldName}" maxlength="20" type="text">
    <button class="master-edit-save" onclick="saveEditMember('${oldName}')">保存</button>
    <button class="master-edit-cancel" onclick="cancelEditMember()">✕</button>
  `;
  item.appendChild(row);
  const inp = document.getElementById('edit-inp-'+CSS.escape(oldName));
  if(inp){ inp.focus(); inp.select(); }
  // Enterキーで保存
  inp.onkeydown = (e)=>{ if(e.key==='Enter') saveEditMember(oldName); };
}

function cancelEditMember(){
  document.querySelectorAll('.master-edit-row').forEach(r=>r.remove());
  document.querySelectorAll('.master-item').forEach(el=>el.style.flexWrap='');
}

async function saveEditMember(oldName){
  const inp = document.getElementById('edit-inp-'+CSS.escape(oldName));
  if(!inp) return;
  const newName = inp.value.trim();
  if(!newName){ toast('名前を入力してください'); return; }
  if(newName===oldName){ cancelEditMember(); return; }
  if(D.members.includes(newName)){ toast('その名前はすでに存在します'); return; }

  setSyncStatus('loading','');
  // Supabaseのmembersテーブルを更新
  const {error} = await sb.from('members').update({name:newName}).eq('name',oldName);
  if(error){ setSyncStatus('err','更新失敗'); toast('更新に失敗しました: '+error.message); return; }

  // 予約データのbooker・membersも更新
  const bkUpdates = D.bookings
    .filter(b=>b.booker===oldName||b.members.includes(oldName))
    .map(b=>({
      id: b.id,
      booker:  b.booker===oldName ? newName : b.booker,
      members: b.members.map(m=>m===oldName?newName:m)
    }));
  for(const u of bkUpdates){
    await sb.from('bookings').update({booker:u.booker, members:u.members}).eq('id',u.id);
  }

  setSyncStatus('ok','');
  await loadAll();
  renderMembers();
  renderMySel();
  toast(`「${oldName}」→「${newName}」に更新しました`);
}

function renderCourses(){
  const fixed = ['OUT→IN','WEST→OUT','IN→WEST'];
  document.getElementById('course-list').innerHTML =
    D.courses.map(c=>`
      <div class="master-item">${c}
        ${fixed.includes(c)
          ? '<span class="fixed-tag">固定</span>'
          : `<button class="master-del" onclick="deleteCourse('${c}')">×</button>`}
      </div>`).join('');
}

function renderGolfCourses(){
  document.getElementById('gcourse-list').innerHTML =
    D.golfCourses.map((g,i)=>`
      <div class="master-item">${g}
        ${i===0
          ? '<span class="fixed-tag">デフォルト</span>'
          : `<button class="master-del" onclick="deleteGolfCourse('${g}')">×</button>`}
      </div>`).join('');
}

function addCourse(){
  const inp = document.getElementById('new-course');
  const name = inp.value.trim();
  if(!name || D.courses.includes(name)){ toast('コース名を入力してください'); return; }
  D.courses.push(name);
  localStorage.setItem('golf_courses', JSON.stringify(D.courses));
  inp.value=''; renderCourses(); toast('追加しました');
}

function deleteCourse(name){
  const fixed=['OUT→IN','WEST→OUT','IN→WEST'];
  if(fixed.includes(name)){ toast('固定コースは削除できません'); return; }
  D.courses = D.courses.filter(c=>c!==name);
  localStorage.setItem('golf_courses', JSON.stringify(D.courses));
  renderCourses(); toast('削除しました');
}

function addGolfCourse(){
  const inp = document.getElementById('new-gcourse');
  const name = inp.value.trim();
  if(!name || D.golfCourses.includes(name)){ toast('ゴルフ場名を入力してください'); return; }
  D.golfCourses.push(name);
  localStorage.setItem('golf_gcourses', JSON.stringify(D.golfCourses));
  inp.value=''; renderGolfCourses(); toast('追加しました');
}

function deleteGolfCourse(name){
  if(D.golfCourses[0]===name){ toast('デフォルトのゴルフ場は削除できません'); return; }
  D.golfCourses = D.golfCourses.filter(g=>g!==name);
  localStorage.setItem('golf_gcourses', JSON.stringify(D.golfCourses));
  renderGolfCourses(); toast('削除しました');
}

async function addMember(){
  const inp = document.getElementById('new-member');
  const name = inp.value.trim();
  if(!name||D.members.includes(name)){ toast('名前を入力してください'); return; }
  const ok = await saveMember(name);
  if(ok){ await loadAll(); inp.value=''; renderMembers(); renderMySel(); }
}

async function deleteMember(name){
  if(D.bookings.some(b=>b.booker===name||b.members.includes(name))){
    toast(`${name}さんは予約に含まれているため削除できません`); return;
  }
  const ok = await deleteMemberDB(name);
  if(ok){ await loadAll(); renderMembers(); }
}

// ══════════════════════════════════════
//  DELETE
// ══════════════════════════════════════
function deleteBk(id){
  showModal('予約を削除','この予約を削除してもよいですか？',[
    {label:'キャンセル', cls:'btn-modal-cancel', fn:closeModal},
    {label:'削除する',   cls:'btn-modal-danger', fn:async()=>{
      const ok = await deleteBookingDB(id);
      if(ok){
        await loadAll();
        closeModal();
        renderCal(); renderDayPanel(); renderList();
        toast('削除しました');
      }
    }}
  ]);
}

// ══════════════════════════════════════
//  MODAL
// ══════════════════════════════════════
function showModal(title,body,btns){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  const wrap = document.getElementById('modal-btns');
  wrap.innerHTML='';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.textContent=b.label; btn.className=b.cls; btn.onclick=b.fn; wrap.appendChild(btn);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
(async()=>{
  setSyncStatus('loading','接続中...');
  await loadAll();
  subscribeRealtime();
  renderCal();
})();
</script>
