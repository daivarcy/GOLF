<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>ゴルフ予約</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:#f5f5f5;color:#1a1a1a;min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom)}

/* ── APP SHELL ── */
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;
  display:flex;flex-direction:column;position:relative}
.header{
  padding:env(safe-area-inset-top,0) 0 0;
  background:#fff;border-bottom:1px solid #e5e5e5;
  position:sticky;top:0;z-index:50;
}
.header-inner{display:flex;align-items:center;gap:10px;padding:14px 16px}
.header h1{font-size:17px;font-weight:600;flex:1}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;
  color:#666;padding:0 4px;line-height:1;display:none}

/* ── NAV ── */
.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e5}
.nav-btn{flex:1;padding:12px 2px;border:none;background:none;
  font-size:11px;color:#888;cursor:pointer;
  border-bottom:2px solid transparent;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .nav-icon{font-size:18px}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)}
.screen.show{display:block}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px}
.cal-month{font-size:17px;font-weight:600}
.cal-arrow{background:none;border:1px solid #ddd;border-radius:8px;
  padding:7px 14px;font-size:15px;cursor:pointer;color:#1a1a1a}
.cal-grid{padding:0 10px}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-wday{text-align:center;font-size:12px;color:#888;padding:4px 0;font-weight:500}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:10px;border:none;background:none;
  font-size:14px;cursor:pointer;position:relative;gap:3px;color:#1a1a1a}
.cal-day:active{background:#f0f0f0}
.cal-day.empty{pointer-events:none}
.cal-day.past{color:#ccc;pointer-events:none}
.cal-day.today{background:#f0f0f0;font-weight:600}
.cal-day.sel{background:#1a1a1a;color:#fff}
.cal-day.sel .dot{background:#fff}
.cal-day .dot{width:5px;height:5px;border-radius:50%;background:#3b82f6}
.cal-day.sun{color:#ef4444}
.cal-day.sat{color:#3b82f6}
.cal-day.past.sun,.cal-day.past.sat{color:#ccc}
.cal-day.sel.sun,.cal-day.sel.sat{color:#fff}

/* ── DAY PANEL ── */
.day-panel{padding:0 12px;margin-top:8px}
.day-title{font-size:15px;font-weight:600;padding:12px 4px 10px}
.bk-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;
  padding:12px 14px;margin-bottom:8px}
.bk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bk-time{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.bk-badges{display:flex;gap:5px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-c{background:#dbeafe;color:#1d4ed8}
.badge-t{background:#dcfce7;color:#15803d}
.bk-members{font-size:13px;color:#555;margin-bottom:3px}
.bk-booker{font-size:12px;color:#888}
.bk-note{font-size:12px;color:#666;margin-top:6px;padding-top:6px;
  border-top:1px solid #f0f0f0}
.bk-actions{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;
  border:1px solid #ddd;background:none;cursor:pointer;
  font-family:inherit;color:#555}
.btn-sm.danger{color:#ef4444;border-color:#fca5a5}
.btn-add-day{
  width:100%;margin-top:4px;padding:14px;
  background:#1a1a1a;color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-add-day:active{opacity:.85}
.empty-day{text-align:center;padding:24px 16px;color:#888;font-size:14px}

/* ── FORM ── */
.form-wrap{padding:0 16px}
.form-sec{margin-top:18px}
.form-label{font-size:12px;color:#666;font-weight:500;
  letter-spacing:.03em;display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;
  font-size:16px;font-family:inherit;background:#fff;color:#1a1a1a;
  -webkit-appearance:none;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#1a1a1a}
.form-input::placeholder,.form-textarea::placeholder{color:#bbb}
.form-textarea{resize:none;line-height:1.6}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;
  transform:translateY(-50%);pointer-events:none;color:#888;font-size:12px}
.member-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.chip{display:inline-flex;align-items:center;gap:5px;
  background:#f5f5f5;border:1px solid #ddd;border-radius:20px;
  padding:5px 10px;font-size:13px}
.chip-del{background:none;border:none;cursor:pointer;
  color:#888;font-size:15px;padding:0;line-height:1}
.member-add-row{display:flex;gap:8px;margin-top:8px}
.member-add-row .sel-wrap{flex:1}
.btn-add-member{padding:12px 16px;background:#1a1a1a;color:#fff;
  border:none;border-radius:10px;font-size:14px;cursor:pointer;
  font-family:inherit;white-space:nowrap}
.conflict-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;
  padding:10px 12px;font-size:13px;color:#b91c1c;margin-top:8px}
.btn-submit{width:100%;margin-top:24px;padding:16px;background:#1a1a1a;
  color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;
  cursor:pointer;font-family:inherit}
.btn-submit:active{opacity:.85}

/* ── LIST ── */
.filter-row{display:flex;gap:6px;padding:12px 14px;
  overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #f0f0f0}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:7px 14px;border:1px solid #ddd;
  border-radius:20px;background:none;font-size:13px;cursor:pointer;
  font-family:inherit;color:#555;flex-shrink:0}
.filter-chip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.list-body{padding:10px 12px}
.list-date-hd{font-size:12px;color:#888;font-weight:600;
  padding:10px 4px 6px;letter-spacing:.04em}

/* ── MY BOOKINGS ── */
.my-top{padding:12px 16px;border-bottom:1px solid #f0f0f0}

/* ── MASTER ── */
.master-sec{padding:16px}
.master-sec+.master-sec{border-top:1px solid #f0f0f0}
.master-sec-title{font-size:14px;font-weight:600;margin-bottom:10px}
.master-item{display:flex;align-items:center;justify-content:space-between;
  padding:11px 12px;background:#f9f9f9;border-radius:8px;
  font-size:14px;margin-bottom:6px}
.master-del{background:none;border:none;cursor:pointer;
  color:#bbb;font-size:18px;padding:0;line-height:1}
.master-add{display:flex;gap:8px;margin-top:4px}
.master-add .form-input{flex:1}
.master-add button{padding:12px 16px;background:#1a1a1a;color:#fff;
  border:none;border-radius:10px;font-size:14px;cursor:pointer;
  font-family:inherit;white-space:nowrap}
.fixed-tag{font-size:11px;padding:2px 8px;border-radius:10px;
  background:#f0f0f0;color:#888}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:200;
  align-items:flex-end;justify-content:center;padding:0}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;
  max-width:480px;padding:24px 20px calc(env(safe-area-inset-bottom,0px)+20px);
  animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:600;margin-bottom:8px}
.modal-body{font-size:14px;color:#666;line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:14px;border-radius:10px;
  font-size:15px;font-family:inherit;cursor:pointer;font-weight:500}
.btn-modal-cancel{background:#f5f5f5;border:none;color:#555}
.btn-modal-ok{background:#1a1a1a;border:none;color:#fff}
.btn-modal-danger{background:#ef4444;border:none;color:#fff}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);
  left:50%;transform:translateX(-50%) translateY(60px);
  background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:30px;
  font-size:14px;opacity:0;transition:all .3s;z-index:300;
  white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
      <h1 id="header-title">ゴルフ予約</h1>
    </div>
    <div class="nav" id="main-nav">
      <button class="nav-btn active" onclick="showTab('cal')">
        <span class="nav-icon">📅</span>カレンダー
      </button>
      <button class="nav-btn" onclick="showTab('list')">
        <span class="nav-icon">📋</span>一覧
      </button>
      <button class="nav-btn" onclick="showTab('my')">
        <span class="nav-icon">👤</span>マイ予約
      </button>
      <button class="nav-btn" onclick="showTab('master')">
        <span class="nav-icon">⚙️</span>マスタ
      </button>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen show" id="sc-cal">
    <div class="cal-nav">
      <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month" id="cal-month"></span>
      <button class="cal-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-wdays">
        <div class="cal-wday" style="color:#ef4444">日</div>
        <div class="cal-wday">月</div><div class="cal-wday">火</div>
        <div class="cal-wday">水</div><div class="cal-wday">木</div>
        <div class="cal-wday">金</div>
        <div class="cal-wday" style="color:#3b82f6">土</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="day-panel" class="day-panel" style="display:none"></div>
  </div>

  <!-- LIST -->
  <div class="screen" id="sc-list">
    <div class="filter-row" id="filter-row"></div>
    <div class="list-body" id="list-body"></div>
  </div>

  <!-- MY -->
  <div class="screen" id="sc-my">
    <div class="my-top">
      <div class="sel-wrap">
        <select class="form-select" id="my-sel" onchange="renderMy()">
          <option value="">メンバーを選択...</option>
        </select>
      </div>
    </div>
    <div class="list-body" id="my-body"></div>
  </div>

  <!-- MASTER -->
  <div class="screen" id="sc-master">
    <div class="master-sec">
      <div class="master-sec-title">メンバーマスタ</div>
      <div id="member-list"></div>
      <div class="master-add">
        <input class="form-input" id="new-member" placeholder="名前を入力" maxlength="20">
        <button onclick="addMember()">追加</button>
      </div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">コースマスタ</div>
      <div class="master-item">OUT→IN <span class="fixed-tag">固定</span></div>
      <div class="master-item">WEST→OUT <span class="fixed-tag">固定</span></div>
      <div class="master-item">IN→WEST <span class="fixed-tag">固定</span></div>
    </div>
    <div class="master-sec">
      <div class="master-sec-title">区分マスタ</div>
      <div class="master-item">通常 <span class="fixed-tag">固定</span></div>
      <div class="master-item">スルー <span class="fixed-tag">固定</span></div>
    </div>
  </div>

  <!-- FORM -->
  <div class="screen" id="sc-form">
    <div class="form-wrap">
      <input type="hidden" id="edit-id">

      <div class="form-sec">
        <label class="form-label">予約者</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-booker" onchange="onFormChange()">
            <option value="">選択してください</option>
          </select>
        </div>
      </div>

      <div class="form-sec">
        <label class="form-label">日付</label>
        <input type="date" class="form-input" id="f-date" onchange="onFormChange()">
      </div>

      <div class="form-sec">
        <label class="form-label">時刻</label>
        <div class="time-row">
          <div class="sel-wrap">
            <select class="form-select" id="f-hour" onchange="onFormChange()"></select>
          </div>
          <div class="sel-wrap">
            <select class="form-select" id="f-min" onchange="onFormChange()"></select>
          </div>
        </div>
      </div>

      <div class="form-sec">
        <label class="form-label">コース</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-course" onchange="onFormChange()">
            <option>OUT→IN</option>
            <option>WEST→OUT</option>
            <option>IN→WEST</option>
          </select>
        </div>
      </div>

      <div class="form-sec">
        <label class="form-label">区分</label>
        <div class="sel-wrap">
          <select class="form-select" id="f-type">
            <option>通常</option>
            <option>スルー</option>
          </select>
        </div>
      </div>

      <div id="conflict-area"></div>

      <div class="form-sec">
        <label class="form-label">同伴メンバー（最大3名）</label>
        <div class="member-chips" id="member-chips"></div>
        <div class="member-add-row" id="member-add-row">
          <div class="sel-wrap">
            <select class="form-select" id="add-mem-sel">
              <option value="">追加するメンバー...</option>
            </select>
          </div>
          <button class="btn-add-member" onclick="addMemberToForm()">追加</button>
        </div>
      </div>

      <div class="form-sec">
        <label class="form-label">備考（任意）</label>
        <textarea class="form-textarea" id="f-note" rows="3" placeholder="コンペ名など"></textarea>
      </div>

      <button class="btn-submit" onclick="submitForm()">予約を登録する</button>
      <div style="height:20px"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const STORE_KEY = 'golf_v2';
let D = { members:['田中','鈴木','佐藤','山田','伊藤'], bookings:[] };
let calY = new Date().getFullYear();
let calM = new Date().getMonth();
let selDate = null;
let editId = null;
let formMems = [];
let prevTab = 'cal';
let curTab  = 'cal';

const today = new Date(); today.setHours(0,0,0,0);
const pad = n => String(n).padStart(2,'0');
const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const dispDate = s => {
  const d = new Date(s+'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
};

// ── STORAGE ──
function loadData(){
  try{ const r=localStorage.getItem(STORE_KEY); if(r) D=JSON.parse(r); }catch(e){}
}
function saveData(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(D)); }catch(e){}
}

// ── TABS ──
function showTab(tab){
  prevTab = curTab; curTab = tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach((b,i)=>
    b.classList.toggle('active',['cal','list','my','master'][i]===tab));
  document.getElementById('sc-'+tab).classList.add('show');
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('header-title').textContent = 'ゴルフ予約';
  if(tab==='cal')    renderCal();
  if(tab==='list')   renderList();
  if(tab==='my')     renderMySel();
  if(tab==='master') renderMembers();
}

function showForm(id=null){
  editId = id; formMems = [];
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('header-title').textContent = id ? '予約を編集' : '予約を登録';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  document.getElementById('sc-form').classList.add('show');

  // 予約者
  const bookerSel = document.getElementById('f-booker');
  bookerSel.innerHTML = '<option value="">選択してください</option>' +
    D.members.map(m=>`<option value="${m}">${m}</option>`).join('');

  // 時刻
  const hSel = document.getElementById('f-hour');
  hSel.innerHTML = Array.from({length:14},(_,i)=>{
    const v=pad(i+6); return`<option value="${v}">${v}時</option>`;
  }).join('');
  const mSel = document.getElementById('f-min');
  mSel.innerHTML = ['00','05','10','15','20','25','30','35','40','45','50','55']
    .map(v=>`<option value="${v}">${v}分</option>`).join('');

  if(id){
    const b = D.bookings.find(x=>x.id===id);
    if(b){
      bookerSel.value = b.booker;
      bookerSel.disabled = true;
      document.getElementById('f-date').value = b.date;
      document.getElementById('f-hour').value = b.hour;
      document.getElementById('f-min').value  = b.min;
      document.getElementById('f-course').value = b.course;
      document.getElementById('f-type').value   = b.type;
      document.getElementById('f-note').value   = b.note||'';
      formMems = [...b.members];
    }
  } else {
    bookerSel.disabled = false;
    bookerSel.value = '';
    document.getElementById('f-date').value   = selDate||'';
    document.getElementById('f-hour').value   = '08';
    document.getElementById('f-min').value    = '00';
    document.getElementById('f-course').value = 'OUT→IN';
    document.getElementById('f-type').value   = '通常';
    document.getElementById('f-note').value   = '';
  }
  renderFormMems();
  checkConflict();
}

function goBack(){
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('header-title').textContent = 'ゴルフ予約';
  showTab(prevTab);
}

// ── CALENDAR ──
function changeMonth(d){
  calM += d;
  if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;}
  selDate = null;
  renderCal();
}

function renderCal(){
  document.getElementById('cal-month').textContent = `${calY}年${calM+1}月`;
  const first = new Date(calY,calM,1);
  const last  = new Date(calY,calM+1,0);
  let html = '';
  for(let i=0;i<first.getDay();i++) html += '<div class="cal-day empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt = new Date(calY,calM,d);
    const ds = fmt(dt);
    const past   = dt < today;
    const isTod  = ds === fmt(today);
    const isSel  = ds === selDate;
    const hasBk  = D.bookings.some(b=>b.date===ds);
    const dow    = dt.getDay();
    let cls = 'cal-day';
    if(past)  cls+=' past';
    if(isTod) cls+=' today';
    if(isSel) cls+=' sel';
    if(!isSel&&dow===0&&!past) cls+=' sun';
    if(!isSel&&dow===6&&!past) cls+=' sat';
    html += `<button class="${cls}" onclick="selectDate('${ds}')">
      <span style="font-size:14px;line-height:1">${d}</span>
      ${hasBk?'<span class="dot"></span>':''}
    </button>`;
  }
  document.getElementById('cal-days').innerHTML = html;
  renderDayPanel();
}

function selectDate(ds){
  const dt = new Date(ds+'T00:00:00');
  if(dt < today) return;
  selDate = ds;
  renderCal();
}

function renderDayPanel(){
  const panel = document.getElementById('day-panel');
  if(!selDate){ panel.style.display='none'; return; }
  panel.style.display = 'block';
  const bks = D.bookings.filter(b=>b.date===selDate);
  let html = `<div class="day-title">${dispDate(selDate)}</div>`;
  if(!bks.length) html += '<div class="empty-day">この日の予約はありません</div>';
  else html += bks.map(b=>bkCardHtml(b,true)).join('');
  html += `<button class="btn-add-day" onclick="showForm(null)">＋ この日に予約する</button>`;
  panel.innerHTML = html;
}

// ── BOOKING CARD ──
function bkCardHtml(b, showActions=false){
  const all = [b.booker,...b.members];
  return `<div class="bk-card">
    <div class="bk-top">
      <span class="bk-time">${b.hour}:${b.min}</span>
      <div class="bk-badges">
        <span class="badge badge-c">${b.course}</span>
        <span class="badge badge-t">${b.type}</span>
      </div>
    </div>
    <div class="bk-members">${all.join('・')}（${all.length}名）</div>
    <div class="bk-booker">予約者：${b.booker}</div>
    ${b.note?`<div class="bk-note">${b.note}</div>`:''}
    ${showActions?`<div class="bk-actions">
      <button class="btn-sm" onclick="showForm('${b.id}')">編集</button>
      <button class="btn-sm danger" onclick="deleteBk('${b.id}')">削除</button>
    </div>`:''}
  </div>`;
}

// ── LIST ──
function renderList(){
  const row = document.getElementById('filter-row');
  if(!row.dataset.init){
    const chips = ['すべて','OUT→IN','WEST→OUT','IN→WEST','通常','スルー'];
    row.innerHTML = chips.map((c,i)=>`<button class="filter-chip${i===0?' on':''}" data-f="${c}" onclick="toggleFilter(this)">${c}</button>`).join('');
    row.dataset.init='1';
  }
  const active = [...row.querySelectorAll('.filter-chip.on')].map(b=>b.dataset.f);
  let bks = [...D.bookings];
  if(!active.includes('すべて'))
    bks = bks.filter(b=>active.some(f=>b.course===f||b.type===f));
  const body = document.getElementById('list-body');
  if(!bks.length){ body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">予約がありません</div>'; return; }
  let html='', last='';
  bks.forEach(b=>{
    if(b.date!==last){ html+=`<div class="list-date-hd">${dispDate(b.date)}</div>`; last=b.date; }
    html+=bkCardHtml(b,true);
  });
  body.innerHTML=html;
}

function toggleFilter(btn){
  if(btn.dataset.f==='すべて'){
    document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  } else {
    document.querySelector('[data-f="すべて"]').classList.remove('on');
    btn.classList.toggle('on');
    if(!document.querySelectorAll('.filter-chip.on').length)
      document.querySelector('[data-f="すべて"]').classList.add('on');
  }
  renderList();
}

// ── MY ──
function renderMySel(){
  const sel = document.getElementById('my-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">メンバーを選択...</option>'+
    D.members.map(m=>`<option value="${m}">${m}</option>`).join('');
  sel.value = cur;
  renderMy();
}
function renderMy(){
  const name = document.getElementById('my-sel').value;
  const body = document.getElementById('my-body');
  if(!name){ body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">メンバーを選択してください</div>'; return; }
  const bks = D.bookings.filter(b=>b.booker===name||b.members.includes(name));
  if(!bks.length){ body.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">予約はありません</div>'; return; }
  let html='', last='';
  bks.forEach(b=>{
    if(b.date!==last){ html+=`<div class="list-date-hd">${dispDate(b.date)}</div>`; last=b.date; }
    html+=bkCardHtml(b, b.booker===name);
  });
  body.innerHTML=html;
}

// ── FORM ──
function onFormChange(){ checkConflict(); renderFormMems(); }

function renderFormMems(){
  const booker = document.getElementById('f-booker').value;
  const chips  = document.getElementById('member-chips');
  chips.innerHTML = formMems.map(m=>`
    <span class="chip">${m}
      <button class="chip-del" onclick="removeMem('${m}')">×</button>
    </span>`).join('');
  const used = new Set([booker,...formMems]);
  const addSel = document.getElementById('add-mem-sel');
  addSel.innerHTML = '<option value="">追加するメンバー...</option>'+
    D.members.filter(m=>!used.has(m)).map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('member-add-row').style.display =
    formMems.length >= 3 ? 'none' : 'flex';
}

function addMemberToForm(){
  const sel = document.getElementById('add-mem-sel');
  if(!sel.value || formMems.length>=3) return;
  formMems.push(sel.value);
  renderFormMems();
}
function removeMem(name){ formMems=formMems.filter(m=>m!==name); renderFormMems(); }

function checkConflict(){
  const date   = document.getElementById('f-date').value;
  const hour   = document.getElementById('f-hour').value;
  const min    = document.getElementById('f-min').value;
  const course = document.getElementById('f-course').value;
  const area   = document.getElementById('conflict-area');
  if(!date||!hour||!min||!course){ area.innerHTML=''; return; }
  const hits = D.bookings.filter(b=>
    b.date===date&&b.hour===hour&&b.min===min&&b.course===course&&b.id!==editId
  );
  area.innerHTML = hits.length
    ? `<div class="conflict-box">⚠ ${hour}:${min} ${course} にすでに${hits.length}件の予約があります（予約者：${hits.map(b=>b.booker).join('・')}）</div>`
    : '';
}

function submitForm(){
  const booker = document.getElementById('f-booker').value;
  const date   = document.getElementById('f-date').value;
  const hour   = document.getElementById('f-hour').value;
  const min    = document.getElementById('f-min').value;
  const course = document.getElementById('f-course').value;
  const type   = document.getElementById('f-type').value;
  const note   = document.getElementById('f-note').value.trim();
  if(!booker){ toast('予約者を選択してください'); return; }
  if(!date)  { toast('日付を選択してください');   return; }

  if(editId){
    const idx = D.bookings.findIndex(b=>b.id===editId);
    if(idx>=0) D.bookings[idx]={...D.bookings[idx],date,hour,min,course,type,members:formMems,note};
  } else {
    D.bookings.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      booker,date,hour,min,course,type,members:formMems,note,
      createdAt:new Date().toISOString()
    });
  }
  D.bookings.sort((a,b)=>
    a.date.localeCompare(b.date)||a.hour.localeCompare(b.hour)||a.min.localeCompare(b.min));
  saveData();
  toast(editId?'予約を更新しました':'予約を登録しました');
  goBack();
}

// ── MASTER ──
function renderMembers(){
  document.getElementById('member-list').innerHTML =
    D.members.map(m=>`
      <div class="master-item">${m}
        <button class="master-del" onclick="deleteMember('${m}')">×</button>
      </div>`).join('');
}
function addMember(){
  const inp = document.getElementById('new-member');
  const name = inp.value.trim();
  if(!name||D.members.includes(name)) return;
  D.members.push(name); inp.value='';
  saveData(); renderMembers();
}
function deleteMember(name){
  if(D.bookings.some(b=>b.booker===name||b.members.includes(name))){
    toast(`${name}さんは予約に含まれているため削除できません`); return;
  }
  D.members=D.members.filter(m=>m!==name);
  saveData(); renderMembers();
}

// ── DELETE ──
function deleteBk(id){
  showModal('予約を削除', 'この予約を削除してもよいですか？', [
    {label:'キャンセル', cls:'btn-modal-cancel', fn:closeModal},
    {label:'削除する',   cls:'btn-modal-danger', fn:()=>{
      D.bookings=D.bookings.filter(b=>b.id!==id);
      saveData(); closeModal();
      renderCal(); renderList(); renderMy();
      toast('削除しました');
    }}
  ]);
}

// ── MODAL ──
function showModal(title, body, btns){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  const wrap = document.getElementById('modal-btns');
  wrap.innerHTML='';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.textContent=b.label; btn.className=b.cls; btn.onclick=b.fn; wrap.appendChild(btn);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// ── TOAST ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──
loadData();
renderCal();
</script>
</body>
</html>
